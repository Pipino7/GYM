# ============================================
# Nginx — SPA + Reverse Proxy a la API
# Optimizado para DigitalOcean 2GB RAM
# ============================================

# Limitar tamaño de requests (seguridad)
client_max_body_size 10M;

# Compresión gzip para reducir ancho de banda
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
  text/plain
  text/css
  text/xml
  text/javascript
  application/json
  application/javascript
  application/x-javascript
  application/xml
  application/xml+rss
  image/svg+xml;

# Cache de archivos estáticos abiertos
open_file_cache max=1000 inactive=20s;
open_file_cache_valid 30s;
open_file_cache_min_uses 2;

server {
    listen 80;
    server_name 165.22.164.114;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Seguridad Headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Reverse Proxy: /api → server container ----
    location /api/ {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts para requests largos (ej: generar PDF)
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ---- Archivos estáticos con cache largo ----
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ---- SPA: cualquier ruta → index.html ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Ocultar archivos sensibles ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
