# ============================================
# Docker Compose — GYM Training App
# Producción optimizada para DigitalOcean 2GB
# ============================================
# Uso:
#   docker compose up -d          → Levantar todo
#   docker compose logs -f        → Ver logs en tiempo real
#   docker compose down           → Detener todo
#   docker compose down -v        → Detener y borrar datos
# ============================================

services:
  # ---- PostgreSQL 16 ----
  db:
    image: postgres:16-alpine
    container_name: gym-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"   # Solo accesible desde el servidor, no público
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Optimización de memoria para 2GB de RAM
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c max_connections=50
        -c log_min_duration_statement=1000
    deploy:
      resources:
        limits:
          memory: 512M

  # ---- Express API + Prisma ----
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gym-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
    deploy:
      resources:
        limits:
          memory: 384M

  # ---- React SPA + Nginx Reverse Proxy ----
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: gym-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
    driver: local
